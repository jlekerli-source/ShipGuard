name: Validate Codex workflow bundle
description: Run the shipguard validator for a workflow bundle checkout.

inputs:
  path:
    description: Path to validate.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Validate workflow bundle
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
      run: |
        "${{ github.action_path }}/../../bin/shipguard" validate "$INPUT_PATH"
