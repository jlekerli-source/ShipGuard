name: Generate ShipGuard review comment
description: Generate a PR-ready ShipGuard review comment, badge JSON, and artifact bundle from an autopsy report.

inputs:
  report:
    description: Path to an autopsy report.json file.
    required: true
  out:
    description: Path to write the Markdown review comment.
    required: false
    default: artifacts/shipguard-review/comment.md
  badge:
    description: Path to write Shields-compatible badge JSON.
    required: false
    default: artifacts/shipguard-review/badge.json
  artifact-dir:
    description: Directory for report.json, report.md, comment.md, and badge.json.
    required: false
    default: artifacts/shipguard-review
  mode:
    description: warn exits zero; fail exits non-zero on blocked reports.
    required: false
    default: warn
  warn-below:
    description: Score below this value is review status unless blocked.
    required: false
    default: "10"
  fail-below:
    description: Score below this value is blocked.
    required: false
    default: "7"

runs:
  using: composite
  steps:
    - name: Generate review comment
      shell: bash
      env:
        INPUT_REPORT: ${{ inputs.report }}
        INPUT_OUT: ${{ inputs.out }}
        INPUT_BADGE: ${{ inputs.badge }}
        INPUT_ARTIFACT_DIR: ${{ inputs.artifact-dir }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_WARN_BELOW: ${{ inputs.warn-below }}
        INPUT_FAIL_BELOW: ${{ inputs.fail-below }}
      run: |
        "${{ github.action_path }}/../../bin/shipguard" review-comment \
          --report "$INPUT_REPORT" \
          --out "$INPUT_OUT" \
          --badge "$INPUT_BADGE" \
          --artifact-dir "$INPUT_ARTIFACT_DIR" \
          --mode "$INPUT_MODE" \
          --warn-below "$INPUT_WARN_BELOW" \
          --fail-below "$INPUT_FAIL_BELOW"
