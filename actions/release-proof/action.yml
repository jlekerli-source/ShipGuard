name: Build ShipGuard release proof
description: Build a release tarball, manifest, index, replay report, attestation, and uploaded proof artifact.

inputs:
  out:
    description: Output artifact directory.
    required: false
    default: artifacts/shipguard-release-proof
  artifact-name:
    description: Uploaded artifact name.
    required: false
    default: shipguard-release-proof
  version:
    description: Release version. Defaults to VERSION.
    required: false
    default: ""
  tag:
    description: Release tag. Defaults to v<version>.
    required: false
    default: ""
  commit:
    description: Release commit. Defaults to github.sha.
    required: false
    default: ""
  ci-run-url:
    description: CI run URL. Defaults to this workflow run URL.
    required: false
    default: ""
  release-url:
    description: Public GitHub release URL for the target tag.
    required: true
  issue-url:
    description: Optional tracking issue URL.
    required: false
    default: ""
  notes:
    description: Optional proof notes.
    required: false
    default: Generated by actions/release-proof.
  upload-artifact:
    description: Set false to skip artifact upload.
    required: false
    default: "true"

outputs:
  tarball:
    description: Path to the release tarball inside the output directory.
    value: ${{ steps.release-proof.outputs.tarball }}
  manifest:
    description: Path to release-manifest.json.
    value: ${{ steps.release-proof.outputs.manifest }}
  replay:
    description: Path to replay-report.json.
    value: ${{ steps.release-proof.outputs.replay }}
  attestation:
    description: Path to attestation.json.
    value: ${{ steps.release-proof.outputs.attestation }}
  attestation-badge:
    description: Path to attestation-badge.json.
    value: ${{ steps.release-proof.outputs.attestation-badge }}

runs:
  using: composite
  steps:
    - name: Build release proof bundle
      id: release-proof
      shell: bash
      env:
        INPUT_OUT: ${{ inputs.out }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_TAG: ${{ inputs.tag }}
        INPUT_COMMIT: ${{ inputs.commit }}
        INPUT_CI_RUN_URL: ${{ inputs.ci-run-url }}
        INPUT_RELEASE_URL: ${{ inputs.release-url }}
        INPUT_ISSUE_URL: ${{ inputs.issue-url }}
        INPUT_NOTES: ${{ inputs.notes }}
        DEFAULT_COMMIT: ${{ github.sha }}
        DEFAULT_CI_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail

        root="${{ github.action_path }}/../.."
        out="$INPUT_OUT"
        mkdir -p "$out"

        version="$INPUT_VERSION"
        if [[ -z "$version" ]]; then
          version="$(sed -n '1p' "$root/VERSION")"
        fi

        tag="$INPUT_TAG"
        if [[ -z "$tag" ]]; then
          tag="v$version"
        fi

        commit="$INPUT_COMMIT"
        if [[ -z "$commit" ]]; then
          commit="$DEFAULT_COMMIT"
        fi

        ci_run_url="$INPUT_CI_RUN_URL"
        if [[ -z "$ci_run_url" ]]; then
          ci_run_url="$DEFAULT_CI_RUN_URL"
        fi

        tarball="$("$root/scripts/package_release.sh")"
        release_tarball="$out/$(basename "$tarball")"
        cp "$tarball" "$release_tarball"

        proof_dir="$out/proof"
        index_dir="$out/index"
        replay_dir="$out/replay"
        attestation_dir="$out/attestation"

        "$root/bin/shipguard" release-manifest \
          --tarball "$release_tarball" \
          --out "$proof_dir" \
          --version "$version" \
          --tag "$tag" \
          --commit "$commit" \
          --ci-run-url "$ci_run_url" \
          --release-url "$INPUT_RELEASE_URL" \
          --issue-url "$INPUT_ISSUE_URL" \
          --notes "$INPUT_NOTES"

        "$root/bin/shipguard" release-manifest verify \
          --manifest "$proof_dir/release-manifest.json" \
          --tarball "$release_tarball" \
          --version "$version" \
          --tag "$tag"

        "$root/bin/shipguard" release-index build \
          --manifest "$proof_dir/release-manifest.json" \
          --out "$index_dir"

        "$root/bin/shipguard" release-replay verify \
          --manifest "$proof_dir/release-manifest.json" \
          --tarball "$release_tarball" \
          --index "$index_dir/release-index.json" \
          --ledger "$proof_dir/proof-ledger.md" \
          --out "$replay_dir"

        "$root/bin/shipguard" release-attest build \
          --manifest "$proof_dir/release-manifest.json" \
          --replay "$replay_dir/replay-report.json" \
          --out "$attestation_dir"

        {
          echo "tarball=$release_tarball"
          echo "manifest=$proof_dir/release-manifest.json"
          echo "replay=$replay_dir/replay-report.json"
          echo "attestation=$attestation_dir/attestation.json"
          echo "attestation-badge=$attestation_dir/attestation-badge.json"
        } >> "$GITHUB_OUTPUT"

    - name: Upload release proof artifact
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.out }}
        if-no-files-found: error
