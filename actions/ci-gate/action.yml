name: Run ShipGuard CI gate
description: Run autopsy, SARIF export, review-comment, badge generation, step-summary output, check-run payload generation, and artifact upload from a ShipGuard run summary.

inputs:
  run:
    description: Path to run.md.
    required: true
  diff:
    description: Optional diff path.
    required: false
    default: ""
  tests:
    description: Optional test log path.
    required: false
    default: ""
  task:
    description: Optional task contract path.
    required: false
    default: ""
  policy:
    description: Optional policy config path.
    required: false
    default: ""
  out:
    description: Output artifact directory.
    required: false
    default: artifacts/shipguard-gate
  mode:
    description: warn exits zero; fail exits non-zero on blocked reports.
    required: false
    default: warn
  artifact-name:
    description: Uploaded artifact name.
    required: false
    default: shipguard-gate
  post-check-run:
    description: Set true to post the generated check-run payload with the GitHub Checks API.
    required: false
    default: "false"
  github-token:
    description: Token used when post-check-run is true. Requires checks: write permission.
    required: false
    default: ""
  check-run-repository:
    description: Repository to post the check run to. Defaults to github.repository.
    required: false
    default: ""
  check-run-api-url:
    description: GitHub API base URL for check-run posting.
    required: false
    default: https://api.github.com

runs:
  using: composite
  steps:
    - name: Run CI gate
      shell: bash
      env:
        INPUT_RUN: ${{ inputs.run }}
        INPUT_OUT: ${{ inputs.out }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_DIFF: ${{ inputs.diff }}
        INPUT_TESTS: ${{ inputs.tests }}
        INPUT_TASK: ${{ inputs.task }}
        INPUT_POLICY: ${{ inputs.policy }}
      run: |
        args=(--run "$INPUT_RUN" --out "$INPUT_OUT" --mode "$INPUT_MODE")
        if [[ -n "$INPUT_DIFF" ]]; then args+=(--diff "$INPUT_DIFF"); fi
        if [[ -n "$INPUT_TESTS" ]]; then args+=(--tests "$INPUT_TESTS"); fi
        if [[ -n "$INPUT_TASK" ]]; then args+=(--task "$INPUT_TASK"); fi
        if [[ -n "$INPUT_POLICY" ]]; then args+=(--policy "$INPUT_POLICY"); fi
        "${{ github.action_path }}/../../bin/shipguard" ci-gate "${args[@]}"

    - name: Append CI gate step summary
      if: ${{ always() }}
      shell: bash
      env:
        INPUT_OUT: ${{ inputs.out }}
      run: |
        summary="$INPUT_OUT/summary.md"
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" && -f "$summary" ]]; then
          cat "$summary" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Generate check-run payload
      if: ${{ always() }}
      shell: bash
      env:
        INPUT_OUT: ${{ inputs.out }}
      run: |
        "${{ github.action_path }}/../../bin/shipguard" check-run \
          --gate "$INPUT_OUT/gate.json" \
          --head-sha "${{ github.sha }}" \
          --out "$INPUT_OUT/check-run/payload.json"

    - name: Post check run
      if: ${{ always() && inputs.post-check-run == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_API_URL: ${{ inputs.check-run-api-url }}
        DEFAULT_CHECK_RUN_REPOSITORY: ${{ github.repository }}
        INPUT_CHECK_RUN_REPOSITORY: ${{ inputs.check-run-repository }}
        INPUT_OUT: ${{ inputs.out }}
      run: |
        repo="$INPUT_CHECK_RUN_REPOSITORY"
        if [[ -z "$repo" ]]; then
          repo="$DEFAULT_CHECK_RUN_REPOSITORY"
        fi
        "${{ github.action_path }}/../../bin/shipguard" check-run post \
          --payload "$INPUT_OUT/check-run/payload.json" \
          --repo "$repo" \
          --out "$INPUT_OUT/check-run/response.json"

    - name: Upload CI gate artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.out }}
        if-no-files-found: error
