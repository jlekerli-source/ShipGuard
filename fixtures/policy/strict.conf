# Strict policy fixture for tests.

max_changed_files=0
protected_patterns=SettingsView|AlarmRuntime|StoreKit
risky_claim_patterns=(^|[^A-Za-z])(release[- ]ready|production[- ]ready|secure|proven|live)([^A-Za-z]|$)
validation_claim_patterns=(^|[^A-Za-z])((tests?|validation|ci).*(passed|green|success|succeeded)|all tests passed)([^A-Za-z]|$)
warn_below=11
fail_below=8
