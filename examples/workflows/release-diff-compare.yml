name: Compare ShipGuard release proof

on:
  workflow_dispatch:
    inputs:
      left-tag:
        description: Older release tag to compare.
        required: true
        default: v0.0.0
      right-tag:
        description: Newer release tag to compare.
        required: true
        default: v3.70.1

permissions:
  contents: read

jobs:
  compare-release-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Compare published proof assets
        uses: jlekerli-source/ShipGuard/actions/release-diff@v3.70.1
        with:
          repo: jlekerli-source/ShipGuard
          left-tag: ${{ inputs.left-tag }}
          right-tag: ${{ inputs.right-tag }}
          mode: fail
